<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ZENIX PREMIUM | Enterprise Digital Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c12;
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      color: #eef5ff;
      overflow-x: hidden;
    }

    /* background premium */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #0f2128, #020408);
      z-index: -2;
    }
    .grid-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(46, 255, 160, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(46, 255, 160, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }

    /* splash screen */
    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #03060be6;
      backdrop-filter: blur(20px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.8s ease;
    }
    .splash-logo {
      width: 120px;
      border-radius: 28px;
      box-shadow: 0 0 30px #2effa0;
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 5px #2effa0; transform: scale(1);}
      100% { box-shadow: 0 0 30px #6effb0; transform: scale(1.02);}
    }
    .splash-text {
      font-family: 'Space Grotesk';
      font-size: 1.6rem;
      margin-top: 20px;
      color: #2effa0;
    }
    .enter-btn {
      margin-top: 30px;
      background: transparent;
      border: 2px solid #2effa0;
      padding: 12px 40px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    /* main container */
    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      opacity: 0;
      transition: opacity 0.8s;
    }
    .main-container.visible {
      opacity: 1;
    }

    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      background: rgba(10, 20, 28, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 80px;
      padding: 0.7rem 2rem;
      border: 1px solid rgba(46, 255, 160, 0.3);
      margin-bottom: 2rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo img {
      width: 45px;
      border-radius: 12px;
    }
    .logo span {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #2effa0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .music-btn {
      background: #000000aa;
      border-radius: 40px;
      padding: 8px 22px;
      border: 1px solid #2effa0;
      cursor: pointer;
    }

    /* hero */
    .hero {
      text-align: center;
      margin: 1rem 0 2rem;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #a0ffd0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* category buttons (VPS, Script, Hosting, Rekber, DLL) */
    .category-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0 1.5rem;
    }
    .cat-btn {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(46, 255, 160, 0.4);
      border-radius: 60px;
      padding: 12px 28px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
    }
    .cat-btn i {
      margin-right: 8px;
      color: #2effa0;
    }
    .cat-btn.active, .cat-btn:hover {
      background: #1e3d32;
      border-color: #2effa0;
      transform: translateY(-3px);
    }

    /* product grid (dinamis) */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0;
    }
    .product-card {
      background: rgba(12, 22, 30, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1.5rem;
      border: 1px solid rgba(46, 255, 160, 0.3);
      transition: 0.25s;
    }
    .product-card:hover {
      transform: translateY(-6px);
      border-color: #2effa0;
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }
    .product-icon {
      font-size: 2.5rem;
      color: #2effa0;
      margin-bottom: 1rem;
    }
    .product-title {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .product-desc {
      font-size: 0.85rem;
      opacity: 0.8;
      margin: 8px 0;
    }
    .product-price {
      font-size: 1.4rem;
      font-weight: 800;
      color: #2effa0;
      margin: 12px 0;
    }
    .order-product {
      width: 100%;
      background: linear-gradient(95deg, #1f4638, #0f2a20);
      border: none;
      padding: 10px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    /* payment section premium */
    .payment-section {
      background: rgba(0, 20, 25, 0.6);
      border-radius: 2rem;
      padding: 1.8rem;
      margin: 2rem 0;
      border: 1px solid #2effa060;
    }
    .payment-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
    }
    .payment-methods {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .payment-item {
      background: #0e1a1f;
      border-radius: 50px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      border: 1px solid #2effa080;
      cursor: pointer;
      transition: 0.2s;
    }
    .payment-item:hover {
      background: #1b4538;
      transform: scale(0.97);
    }

    /* owner & copyright */
    .owner-area {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 2rem;
      padding: 1.5rem;
      margin: 1.5rem 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .owner-badge {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .owner-btn {
      background: #1a3a2e;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
    }
    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid #2effa030;
      margin-top: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #000000cc;
      border-left: 4px solid #2effa0;
      padding: 10px 24px;
      border-radius: 50px;
      z-index: 2000;
      opacity: 0;
      transition: 0.2s;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }
    .modal-card {
      background: #0d171f;
      border: 2px solid #2effa0;
      border-radius: 32px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    @media (max-width: 680px) {
      .hero h1 { font-size: 1.8rem; }
      .main-container { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="grid-pattern"></div>

<!-- SPLASH -->
<div id="splash" class="splash">
  <img src="https://files.catbox.moe/5awz68.jpg" class="splash-logo" alt="Zenix">
  <div class="splash-text">ZENIX PREMIUM MARKETPLACE</div>
  <button id="enterSplash" class="enter-btn">ENTER <i class="fas fa-arrow-right"></i></button>
</div>

<!-- MAIN -->
<div id="mainApp" class="main-container">
  <div class="header">
    <div class="logo">
      <img src="https://files.catbox.moe/5awz68.jpg" alt="logo">
      <span>ZENIX CORP</span>
    </div>
    <div class="music-btn" id="musicToggle"><i class="fas fa-headphones"></i> <span id="musicStatus">ACTIVATE</span></div>
  </div>

  <div class="hero">
    <h1>Premium Digital Marketplace</h1>
    <p>VPS | Script | Hosting | Rekber | Custom Solutions</p>
  </div>

  <!-- Category Buttons -->
  <div class="category-bar">
    <button class="cat-btn active" data-cat="vps"><i class="fas fa-server"></i> VPS</button>
    <button class="cat-btn" data-cat="script"><i class="fas fa-code"></i> All Script</button>
    <button class="cat-btn" data-cat="hosting"><i class="fas fa-cloud-upload-alt"></i> Hosting</button>
    <button class="cat-btn" data-cat="rekber"><i class="fas fa-handshake"></i> Rekber</button>
    <button class="cat-btn" data-cat="dll"><i class="fas fa-cogs"></i> Layanan Lain</button>
  </div>

  <!-- Dynamic Products Grid -->
  <div id="productsContainer" class="products-grid"></div>

  <!-- Payment Section Premium -->
  <div class="payment-section">
    <div class="payment-title"><i class="fas fa-credit-card"></i> Metode Pembayaran Resmi</div>
    <div class="payment-methods">
      <div class="payment-item" data-pay="dana"><i class="fas fa-mobile-alt"></i> DANA</div>
      <div class="payment-item" data-pay="gopay"><i class="fab fa-google-pay"></i> GOPAY</div>
      <div class="payment-item" data-pay="ovo"><i class="fas fa-wallet"></i> OVO</div>
      <div class="payment-item" data-pay="qris"><i class="fas fa-qrcode"></i> QRIS</div>
      <div class="payment-item" data-pay="saweria"><i class="fas fa-donate"></i> SAWERIA</div>
    </div>
  </div>

  <!-- Owner & Copyright -->
  <div class="owner-area">
    <div class="owner-badge">
      <button class="owner-btn" data-owner="MiaaBack"><i class="fas fa-crown"></i> Owner: MiaaBack</button>
      <button class="owner-btn" data-owner="skyzenix"><i class="fas fa-user-tie"></i> Co-Owner: skyzenix</button>
      <button class="owner-btn" data-owner="MI44BACK"><i class="fas fa-bullhorn"></i> Marketing: MI44BACK</button>
    </div>
    <div><i class="far fa-copyright"></i> 2025 ZENIX CORPORATION - All Rights Reserved</div>
  </div>
  <footer>Official Telegram: @MiaaBack | @skyzenix | @chnewsky</footer>
</div>

<!-- MODAL -->
<div id="modalGlobal" class="modal">
  <div class="modal-card">
    <div id="modalText" style="font-size:1.3rem;"></div>
    <div id="modalExtra"></div>
    <button id="modalCopyBtn" style="background:#1f5a48; border:none; padding:8px 20px; border-radius:40px; margin:12px 0; display:none;">📋 Salin</button>
    <button id="closeModal" style="background:#e53935; border:none; padding:8px 20px; border-radius:40px;">Tutup</button>
  </div>
</div>
<div id="toastMsg" class="toast">✓ Tersalin</div>
<audio id="bgAudio" loop preload="auto"><source src="https://files.catbox.moe/emfblf.mp3" type="audio/mpeg"></audio>

<script>
  // ==================== DATA PRODUK LENGKAP ====================
  const productsData = {
    vps: [
      { name: "VPS Starter", desc: "1 vCPU, 2GB RAM, 50GB SSD", price: "Rp 50.000/bln", icon: "fas fa-microchip" },
      { name: "VPS Business", desc: "2 vCPU, 4GB RAM, 100GB SSD + DDoS", price: "Rp 70.000/bln", icon: "fas fa-server" },
      { name: "VPS Pro", desc: "4 vCPU, 8GB RAM, 200GB NVMe", price: "Rp 90.000/bln", icon: "fas fa-database" },
      { name: "VPS Offshore", desc: "Anonymous, Offshore location", price: "Rp 150.000/bln", icon: "fas fa-globe" }
    ],
    script: [
      { name: "Bot Telegram Premium", desc: "Auto reply, group manager, AI", price: "Rp 10.000", icon: "fab fa-telegram" },
      { name: "Panel Hosting + Theme", desc: "WHMCS like, auto install", price: "Rp 10.000", icon: "fas fa-panel" },
      { name: "AI Tools Script", desc: "ChatGPT clone, image generator", price: "Rp 3.000", icon: "fas fa-robot" },
      { name: "E-commerce Fullstack", desc: "Laravel + React, ready use", price: "Rp 15.000", icon: "fas fa-store" }
    ],
    hosting: [
      { name: "Shared Hosting", desc: "10GB, 1 domain, SSL", price: "Rp 15.000/thn", icon: "fas fa-cloud" },
      { name: "Reseller Hosting", desc: "Unlimited accounts, WHM", price: "Rp 100.000/bln", icon: "fas fa-chart-line" },
      { name: "Cloud Hosting", desc: "High availability, 99.9% uptime", price: "Rp 50.000/bln", icon: "fas fa-cloud-upload-alt" }
    ],
    rekber: [
      { name: "Rekber Standar", desc: "Mediasi transaksi, aman", price: "Fee 2%", icon: "fas fa-handshake" },
      { name: "Rekber Premium", desc: "Prioritas + dispute handling", price: "Fee 1.5%", icon: "fas fa-shield-alt" }
    ],
    dll: [
      { name: "Install Panel / Script", desc: "Full setup + konfigurasi", price: "Rp 5.000", icon: "fas fa-tools" },
      { name: "Maintenance Server", desc: "Bulanan support 24/7", price: "Rp 20.000/bln", icon: "fas fa-wrench" },
      { name: "Custom API Development", desc: "REST API sesuai kebutuhan", price: "Nego", icon: "fas fa-code-branch" }
    ]
  };

  let currentCategory = "vps";

  function renderProducts(category) {
    const container = document.getElementById("productsContainer");
    const products = productsData[category];
    if (!products) return;
    container.innerHTML = "";
    products.forEach(prod => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <div class="product-icon"><i class="${prod.icon}"></i></div>
        <div class="product-title">${prod.name}</div>
        <div class="product-desc">${prod.desc}</div>
        <div class="product-price">${prod.price}</div>
        <button class="order-product" data-name="${prod.name}" data-price="${prod.price}">ORDER NOW <i class="fas fa-arrow-right"></i></button>
      `;
      container.appendChild(card);
    });
    // attach event ke tombol order
    document.querySelectorAll(".order-product").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const name = btn.getAttribute("data-name");
        const price = btn.getAttribute("data-price");
        showOrderModal(name, price);
      });
    });
  }

  function showOrderModal(productName, productPrice) {
    modalText.innerHTML = `🛒 ORDER: ${productName}<br><span style="font-size:1rem;">${productPrice}</span>`;
    modalExtra.innerHTML = `<div style="margin:15px 0; display:flex; flex-direction:column; gap:10px;">
      <button id="contactOwnerModal" style="background:#1f5f4c; border:none; padding:10px; border-radius:40px;">📱 Hubungi Owner (MiaaBack)</button>
      <button id="contactCoModal" style="background:#1f5f4c; border:none; padding:10px; border-radius:40px;">📱 Hubungi Co-Owner (skyzenix)</button>
    </div>`;
    modal.style.display = "flex";
    modalCopyBtn.style.display = "none";
    setTimeout(() => {
      const ownerBtn = document.getElementById("contactOwnerModal");
      const coBtn = document.getElementById("contactCoModal");
      if(ownerBtn) ownerBtn.onclick = () => { copyToClipboard("@MiaaBack"); showToast("Username Owner disalin"); closeModal(); };
      if(coBtn) coBtn.onclick = () => { copyToClipboard("@skyzenix"); showToast("Co-Owner disalin"); closeModal(); };
    }, 10);
  }

  // PAYMENT DETAILS
  const paymentDetails = {
    dana: "085608969326",
    gopay: "Close",
    ovo: "Close",
    qrisImg: "https://files.catbox.moe/qwbsk8.jpg",
    saweria: "https://sociabuzz.com/alex1/tribe"
  };

  function showPaymentModal(method) {
    if(method === "qris") {
      modalText.innerHTML = `💳 QRIS Payment`;
      modalExtra.innerHTML = `<img src="${paymentDetails.qrisImg}" style="max-width:200px; border-radius:20px; margin:10px auto;"><div>Scan menggunakan aplikasi OVO/DANA/GOPAY</div>`;
      modalCopyBtn.style.display = "none";
    } else {
      let value = paymentDetails[method];
      modalText.innerHTML = `💎 ${method.toUpperCase()}`;
      modalExtra.innerHTML = `<div style="font-size:2rem; font-weight:bold;">${value}</div><div style="font-size:0.7rem;">Nomor resmi, transfer sesuai total</div>`;
      modalCopyBtn.style.display = "inline-block";
      currentCopyValue = value;
    }
    modal.style.display = "flex";
  }

  // Global modal & copy
  const modal = document.getElementById("modalGlobal");
  const modalText = document.getElementById("modalText");
  const modalExtra = document.getElementById("modalExtra");
  const modalCopyBtn = document.getElementById("modalCopyBtn");
  const closeModalBtn = document.getElementById("closeModal");
  let currentCopyValue = "";

  function closeModal() { modal.style.display = "none"; modalExtra.innerHTML = ""; }
  closeModalBtn.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if(e.target === modal) closeModal(); });
  modalCopyBtn.addEventListener("click", () => {
    if(currentCopyValue) {
      copyToClipboard(currentCopyValue);
      showToast(`✓ ${currentCopyValue} disalin`);
    }
  });

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
  }
  function showToast(msg) {
    const toast = document.getElementById("toastMsg");
    toast.innerText = msg;
    toast.style.opacity = "1";
    setTimeout(() => toast.style.opacity = "0", 2000);
  }

  // event kategori
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentCategory = btn.getAttribute("data-cat");
      renderProducts(currentCategory);
    });
  });

  // payment click
  document.querySelectorAll(".payment-item").forEach(item => {
    item.addEventListener("click", () => {
      const method = item.getAttribute("data-pay");
      showPaymentModal(method);
    });
  });

  // owner buttons
  document.querySelectorAll(".owner-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const ownerName = btn.getAttribute("data-owner");
      copyToClipboard(`@${ownerName}`);
      showToast(`Username @${ownerName} disalin, hubungi via Telegram`);
    });
  });

  // MUSIC
  const audio = document.getElementById("bgAudio");
  const musicBtn = document.getElementById("musicToggle");
  const musicStatusSpan = document.getElementById("musicStatus");
  let isPlaying = false;
  function toggleMusic() {
    if(audio.paused) {
      audio.play().then(() => { isPlaying = true; musicStatusSpan.innerText = "ON"; musicBtn.innerHTML = '<i class="fas fa-volume-up"></i> <span id="musicStatus">ON</span>'; }).catch(() => { isPlaying = true; musicStatusSpan.innerText = "ON"; });
    } else {
      audio.pause();
      isPlaying = false;
      musicStatusSpan.innerText = "ACTIVATE";
      musicBtn.innerHTML = '<i class="fas fa-headphones"></i> <span id="musicStatus">ACTIVATE</span>';
    }
  }
  musicBtn.addEventListener("click", toggleMusic);
  window.addEventListener("load", () => { audio.play().catch(e=>{}); });

  // SPLASH SCREEN
  const splashDiv = document.getElementById("splash");
  const mainApp = document.getElementById("mainApp");
  const enterSplash = document.getElementById("enterSplash");
  enterSplash.addEventListener("click", () => {
    splashDiv.style.opacity = "0";
    setTimeout(() => {
      splashDiv.style.display = "none";
      mainApp.classList.add("visible");
    }, 800);
  });

  // render default
  renderProducts("vps");

  // tambahan copy telegram (optional)
  // juga tombol order dari product sudah dihandle
</script>
</body>
</html>
